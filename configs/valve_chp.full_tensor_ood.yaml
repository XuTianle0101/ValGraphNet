# CHP-GNS Valve/Abaqus template. This file is intentionally not a source of
# simulation data: export real ODB cases, provide explicit geometry/material
# ids, and generate the strict split before training.
seed: 42

data:
  root: data/valve_chp_cases
  split_file: data/valve_chp_cases/splits.strict_ood.json
  train_split: train
  val_split: val
  test_split: test
  pressure_sign: 1.0
  noise_std: 0.003
  requirements:
    required_metadata: [geometry_id, material_id]
    required_files:
      - cells.npy
      - Dm_inv.npy
      - reference_volume.npy
      - shape_gradients.npy
      - lumped_mass.npy
      - S.npy
      - S_cell.npy
      - S_integration_point.npy
      - integration_point_mask.npy
      - LE_cell.npy
      - material.json
      - material_features.npy
      - density.npy
      - fiber_direction.npy
    full_cell_stress_tensor: true
    full_integration_point_stress_tensor: true
    full_cell_strain_tensor: true
    material_json: true
    material_features: true
    material_feature_names: true
    density: true
    fiber_direction: true
    stress_tensor_components: [S11, S22, S33, S12, S13, S23]
    strain_tensor_components: [LE11, LE22, LE33, LE12, LE13, LE23]

ood_split:
  strategy: geometry_material_combination_disjoint
  seed: 42
  geometry_metadata_key: geometry_id
  material_metadata_key: material_id
  validation_fraction: 0.1
  test_fraction: 0.1

model:
  scalar_dim: 96
  vector_dim: 16
  cell_dim: 64
  potential_order: 2
  normalize_potential_scale: true
  potential_i1_init: [0.5, 1.0e-6]
  potential_i2_init: [0.01, 1.0e-10]
  potential_j_init: [1.0, 0.1]
  potential_log_j_init: 1.0
  potential_minimum_coefficient: 1.0e-12
  fiber_order: 2
  fiber_init: [0.1, 1.0e-4]
  inversion_stiffness: 10.0
  minimum_j: 0.0
  contact_substeps: 2
  residual_acceleration_reference: 1.0e-3
  residual_acceleration_cap: 1.0e-2
  residual_activity_scale: 1.0e-2
  residual_activity_diffusion_steps: 2
  integration_minimum_j: 1.0e-4
  integration_maximum_i2_bar: 1.0e6
  integration_backtracks: 8
  activation_checkpointing: true
  # These dimensionless initial scales assume the exported ODB uses a
  # self-consistent unit system; calibrate them from the training split only.
  initial_stress_scale: 1.0
  initial_mass_scale: 1.0
  initial_contact_scale: 1.0
  initial_damping_scale: 0.1

contact:
  enabled: true
  # ODB length units are project-specific. Replace this training-only value
  # with a mesh-derived radius before launching the formal experiment.
  radius: 0.03
  max_neighbors: 32

loss:
  position: 1.0
  velocity: 1.0
  stress: 1.0
  stress_physical_weight: 0.25
  exact_constitutive: 0.5
  work_energy: 0.1
  penetration: 1.0
  residual: 0.01
  negative_j: 10.0
  huber_delta: 1.0
  peak_fraction: 0.1
  peak_weight: 0.5

constitutive_pretraining:
  enabled: true
  calibration_cases: 32
  calibration_frames: 8
  minimum_scale_factor: 1.0e-3
  maximum_scale_factor: 1.0e4
  preserve_force_mass_ratio: true
  epochs: 2
  cases_per_epoch: 128
  frames_per_case: 8
  lr: 1.0e-3
  grad_clip_norm: 10.0

dynamics_pretraining:
  enabled: true
  epochs: 3
  head_warmup_epochs: 1
  trajectories_per_epoch: 500
  validation_cases: 10
  validation_frames: 8
  lr: 1.0e-4
  head_warmup_lr: 1.0e-3
  joint_head_lr: 5.0e-4
  weight_decay: 1.0e-6
  grad_clip_norm: 1.0
  position_weight: 0.25
  velocity_weight: 0.25
  acceleration_weight: 1.0
  direction_weight: 0.25
  quiet_weight: 0.05
  active_node_fraction: 0.2
  active_threshold: 0.05
  stress_weight: 0.1
  residual_weight: 1.0e-3

training:
  device: cuda
  amp: true
  amp_dtype: bfloat16
  mechanics_dtype: float32
  epochs: 16
  curriculum:
    - {horizon: 1, epochs: 4}
    - {horizon: 2, epochs: 3}
    - {horizon: 4, epochs: 3}
    - {horizon: 8, epochs: 3}
    - {horizon: 16, epochs: 3}
  tbptt_chunk: 4
  checkpoint_min_horizon: 8
  pushforward_stop_gradient: true
  trajectories_per_epoch: 1000
  lr: 1.0e-4
  constitutive_lr_scale: 0.1
  weight_decay: 1.0e-6
  warmup_steps: 500
  grad_clip_norm: 1.0
  fused_optimizer: true
  gpu_case_cache_size: 3
  normalizer_cases: 128
  normalizer_frames: 8
  normalizer_nodes: 256
  output_dir: outputs/valve_chp_full_tensor_seed42
  resume_from: auto

validation:
  stage_end_only: true
  cases: 20
  steps: 399
  teacher_stress_cases: 20
  teacher_stress_frames: 16
  teacher_stress_threshold: 0.50
  enforce_teacher_stress_gate: true
  enforce_rollout_pilot_gate: true
  pilot_moving_relative_rmse_threshold: 0.80
  pilot_stress_relative_rmse_threshold: 0.65
  gpu_case_cache_size: 2
  divergence_position: 10.0
  minimum_predicted_j: 1.0e-4
  maximum_predicted_i2_bar: 1.0e6
  require_native_reference_provenance: true
  native_reference_split: val
  native_reference_case_selection: even
  native_reference_file: outputs/valve_chp_evidence/native_val20/metrics.json

evaluation:
  save_cell_stress: true
