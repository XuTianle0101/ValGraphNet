seed: 42

data:
  root: data/deforming_plate_cases
  split_file: data/deforming_plate_cases/splits.json
  train_split: train
  val_split: val
  pressure_sign: 0.0
  require_pressure_mask: false
  require_fixed_mask: true
  max_train_samples_for_stats: 512

contact:
  enabled: true
  radius: 0.03
  radius_factor: 2.5
  max_edges: 200000
  max_neighbors: 32
  different_leaflets_only: false

normalization:
  enabled: true
  eps: 1.0e-8

model:
  type: hybrid
  processor_size: 15
  hidden_dim_processor: 128
  aggregation: sum
  activation: relu
  node_layers: 2
  edge_layers: 2
  decoder_layers: 2
  do_concat_trick: false
  num_processor_checkpoint_segments: 3
  checkpoint_offloading: false
  recompute_activation: false

training:
  epochs: 12
  steps_per_trajectory_per_epoch: 1
  validation_steps_per_trajectory: 3
  batch_size: 1
  num_workers: 0
  lr: 1.0e-4
  weight_decay: 0.0
  grad_clip_norm: 1.0
  output_dir: outputs/deforming_plate_case_full_gpu
  save_every: 1
  save_latest: true
  resume_from: auto
  device: auto
  amp: true
  amp_dtype: bfloat16

loss:
  delta_u: 1.0
  delta_v: 0.1
  accel: 0.05
  stress: 0.1

rollout:
  steps: null
